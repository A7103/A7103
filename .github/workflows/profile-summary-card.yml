name: generate profile summary card

on:
  schedule:
    - cron: "30 15 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: generate-github-profile-summary-cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: "master"
          UTC_OFFSET: 0
          EXCLUDE: ""
          AUTO_PUSH: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
      - run: |
            git config user.name github-actions
            git config user.email github-actions@github.com
            git add .profile-summary-card-output/github_dark/0-profile-details.svg
            git add .profile-summary-card-output/github_dark/1-repos-per-language.svg
            git add .profile-summary-card-output/github/0-profile-details.svg
            git add .profile-summary-card-output/github/1-repos-per-language.svg
            git commit -m "Update profile summary card"
            git push